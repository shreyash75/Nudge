services:

  db:
    image: postgres:16-alpine
    container_name: Nudge-db
    environment:
      POSTGRES_USER: nudge_user
      POSTGRES_PASSWORD: nudge_password
      POSTGRES_DB: nudge_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nudge_user -d nudge_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: Nudge-backend
    depends_on:
      db:
        condition: service_healthy  
    environment:
      PORT: "5000"
      DB_USER: nudge_user
      DB_PASSWORD: nudge_password
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: nudge_db
    ports:
      - "5000:5000"

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: Nudge-frontend
    depends_on:
      - backend
    environment:
      PORT: "3000"
    ports:
      - "80:80"

volumes:
  db_data:
    driver: local
